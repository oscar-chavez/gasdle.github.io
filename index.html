<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>GASDLE — Guess the Pump Price</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0b0d10;--bg2:#11151b;--panel:#161b22;--panel2:#1c2330;--line:#283142;--ink:#e9eef5;--muted:#8a96a8;
    --amber:#ffb627;--amber-dim:#9b7320;--green:#3dd68c;--red:#ff5c5c;--blue:#5ca8ff;--readout:#ffce5c;
    --shadow:0 18px 50px -20px rgba(0,0,0,.8);--r:18px;}
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{background:radial-gradient(900px 500px at 50% -10%,rgba(255,182,39,.10),transparent 60%),radial-gradient(700px 600px at 110% 20%,rgba(92,168,255,.06),transparent 60%),var(--bg);
    color:var(--ink);font-family:"Bricolage Grotesque",system-ui,sans-serif;min-height:100dvh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.015) 0 1px,transparent 1px 3px);mix-blend-mode:overlay;opacity:.5}
  .wrap{width:100%;max-width:460px;padding:18px 16px 28px;position:relative;z-index:1;display:flex;flex-direction:column;gap:14px}
  header{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(160deg,var(--amber),#e07c00);display:grid;place-items:center;box-shadow:0 8px 22px -8px rgba(255,182,39,.6)}
  .logo svg{width:22px;height:22px} .title{font-weight:800;letter-spacing:.16em;font-size:20px;line-height:1}
  .title small{display:block;letter-spacing:.22em;font-size:9px;color:var(--muted);margin-top:4px;font-weight:600}
  .header-tools{display:flex;gap:8px}
  .icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--panel);color:var(--ink);cursor:pointer;display:grid;place-items:center;transition:.18s ease}
  .icon-btn:hover{background:var(--panel2);border-color:var(--amber-dim);transform:translateY(-1px)} .icon-btn svg{width:18px;height:18px}
  .pump{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .tag{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;font-weight:700}
  .tag .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);box-shadow:0 0 10px var(--amber);animation:blink 1.6s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .display{margin-top:12px;background:#06080b;border:1px solid #222a36;border-radius:14px;padding:16px 18px;position:relative;overflow:hidden}
  .display::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,206,92,.05) 0 2px,transparent 2px 4px);pointer-events:none}
  .display .lbl{font-size:10px;letter-spacing:.18em;color:#6b7686;text-transform:uppercase;font-weight:700}
  .readout{font-family:"DM Mono",monospace;font-weight:500;font-size:54px;line-height:1;color:var(--readout);text-shadow:0 0 18px rgba(255,206,92,.45);letter-spacing:.02em;margin-top:6px;display:flex;align-items:baseline;gap:2px}
  .readout .cur{font-size:26px;opacity:.8;transform:translateY(-12px)}
  .readout.win{color:var(--green);text-shadow:0 0 22px rgba(61,214,140,.5)}
  .readout.flick{animation:flick .5s ease} @keyframes flick{0%,100%{opacity:1}20%{opacity:.4}40%{opacity:1}55%{opacity:.5}}
  .locator{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);background:#070a0e;position:relative}
  #map,#streetview{width:100%;height:172px;background:#0c1219}
  .panelhead{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:space-between;
    padding:8px 11px;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:#aeb8c6;font-weight:700;
    background:linear-gradient(180deg,rgba(6,8,11,.85),transparent);pointer-events:none}
  .panelhead b{color:var(--amber)} .zoomchip{font-family:"DM Mono",monospace;color:var(--amber)}
  .mapwrap{position:relative} .svwrap{position:relative;border-top:1px solid var(--line);display:none} .svwrap.on{display:block}
  .placeholder{height:172px;display:grid;place-items:center;text-align:center;color:#5f6f84;font-size:12px;padding:0 24px;background:repeating-linear-gradient(45deg,rgba(255,255,255,.012) 0 12px,transparent 12px 24px)}
  .placeholder code{color:var(--amber);font-family:"DM Mono",monospace;font-size:11px}
  .hints{display:flex;flex-direction:column;gap:8px}
  .hint{display:flex;align-items:center;gap:11px;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:12px;padding:11px 13px;font-size:13.5px;animation:hintIn .45s cubic-bezier(.2,.8,.2,1)}
  @keyframes hintIn{from{opacity:0;transform:translateY(-8px);filter:blur(3px)}to{opacity:1;transform:none;filter:none}}
  .hint .hk{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .hint .hv{font-weight:600} .hint .hbadge{margin-left:auto;font-family:"DM Mono",monospace;font-size:11px;color:var(--amber);border:1px solid var(--amber-dim);border-radius:999px;padding:3px 9px;white-space:nowrap}
  .hint .brandwrap{display:flex;align-items:center;gap:9px}
  .hint .blogo{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;font-weight:800;font-size:11px;color:#0b0d10;font-family:"DM Mono",monospace;background:var(--amber)}
  .guesses{display:flex;flex-direction:column;gap:7px}
  .grow{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 14px;animation:rowIn .4s cubic-bezier(.2,.9,.2,1)}
  @keyframes rowIn{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:none}}
  .grow .gval{font-family:"DM Mono",monospace;font-size:18px;font-weight:500}
  .meter{height:7px;border-radius:999px;background:#0c1016;position:relative;overflow:hidden}
  .meter i{position:absolute;inset:0 auto 0 0;border-radius:999px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .verdict{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;white-space:nowrap} .verdict svg{width:16px;height:16px}
  .v-cold{color:var(--blue)} .v-high{color:var(--red)} .v-win{color:var(--green)}
  .pad{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
  .pendlbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;text-align:center}
  .pend{font-family:"DM Mono",monospace;font-size:46px;font-weight:500;text-align:center;color:var(--ink);margin:4px 0 12px}
  .pend.shake{animation:shake .4s} @keyframes shake{10%,90%{transform:translateX(-2px)}30%,70%{transform:translateX(4px)}50%{transform:translateX(-6px)}}
  .slider{width:100%;-webkit-appearance:none;height:8px;border-radius:999px;background:linear-gradient(90deg,var(--green),var(--readout),var(--red));outline:none;margin:2px 0 14px}
  .slider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:4px solid var(--amber);cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.5)}
  .slider::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#fff;border:4px solid var(--amber);cursor:pointer}
  .steppers{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  .step{border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:11px;padding:10px 0;font-family:"DM Mono",monospace;font-size:13px;cursor:pointer;transition:.15s ease}
  .step:hover{border-color:var(--amber-dim);background:#222b3a;transform:translateY(-1px)} .step:active{transform:translateY(0) scale(.97)}
  .submit{width:100%;border:none;border-radius:13px;padding:15px;cursor:pointer;background:linear-gradient(160deg,var(--amber),#e07c00);color:#1a1205;font-weight:800;letter-spacing:.08em;font-size:14px;text-transform:uppercase;transition:.18s ease;box-shadow:0 10px 26px -10px rgba(255,182,39,.7)}
  .submit:hover{transform:translateY(-2px);box-shadow:0 16px 32px -10px rgba(255,182,39,.8)}
  .triesleft{text-align:center;color:var(--muted);font-size:12px;margin-top:10px} .triesleft b{color:var(--amber)}
  .result{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--r);padding:18px;text-align:center;box-shadow:var(--shadow);animation:hintIn .5s ease}
  .result h2{margin:0 0 4px;font-size:22px} .result .sub{color:var(--muted);font-size:13px;margin-bottom:14px}
  .result .full{background:#06080b;border:1px solid #222a36;border-radius:12px;padding:12px 14px;margin-bottom:14px;text-align:left}
  .result .full .nm{font-weight:800;font-size:16px} .result .full .ad{color:var(--muted);font-size:13px;margin-top:2px}
  .result .full .pr{font-family:"DM Mono",monospace;font-size:30px;color:var(--readout);margin-top:8px;text-shadow:0 0 16px rgba(255,206,92,.4)}
  .result .full .stale{color:#6b7686;font-size:11px;margin-top:4px}
  .resbtns{display:flex;gap:8px} .resbtns button{flex:1;border-radius:12px;padding:13px;font-weight:700;cursor:pointer;border:1px solid var(--line);transition:.15s ease;font-size:13px}
  .btn-share{background:var(--green);color:#062a18;border-color:transparent} .btn-share:hover{filter:brightness(1.08);transform:translateY(-1px)}
  .btn-ghost{background:var(--panel);color:var(--ink)} .countdown{margin-top:12px;font-size:12px;color:var(--muted)} .countdown b{font-family:"DM Mono",monospace;color:var(--ink)}
  .adslot{border:1px dashed var(--line);border-radius:14px;min-height:96px;display:grid;place-items:center;color:#5a6678;font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;overflow:hidden}
  footer{text-align:center;color:#54607a;font-size:11px;line-height:1.6}
  .scrim{position:fixed;inset:0;background:rgba(4,6,9,.72);backdrop-filter:blur(6px);z-index:50;display:none;align-items:center;justify-content:center;padding:18px;animation:fade .25s ease}
  .scrim.on{display:flex} @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{width:100%;max-width:420px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:var(--shadow);animation:rowIn .3s ease}
  .modal h3{margin:0 0 4px} .modal p{color:var(--muted);font-size:13.5px;line-height:1.6}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 6px;text-align:center}
  .stat b{display:block;font-family:"DM Mono",monospace;font-size:24px} .stat span{font-size:9.5px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
  .dbar{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:12px;font-family:"DM Mono",monospace}
  .dbar .n{width:14px;color:var(--muted)} .dbar .fill{height:20px;border-radius:5px;background:var(--amber-dim);display:flex;align-items:center;justify-content:flex-end;padding:0 7px;color:#1a1205;font-weight:700;min-width:22px;transition:width .5s ease}
  .dbar .fill.cur{background:var(--amber)}
  .close-x{float:right;cursor:pointer;color:var(--muted);border:none;background:none;font-size:22px;line-height:1;margin-top:-6px}
  .how li{color:var(--muted);font-size:13.5px;line-height:1.7;margin-bottom:4px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:#0b0d10;padding:11px 18px;border-radius:999px;font-weight:700;font-size:13px;z-index:60;transition:.3s ease;pointer-events:none}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#1a1205" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v15"/><path d="M3 20h12"/><path d="M14 8h2.5a1.5 1.5 0 0 1 1.5 1.5V16a2 2 0 0 0 2 2 2 2 0 0 0 2-2v-7l-3-3"/><path d="M7 7h4"/></svg></div>
      <div class="title">GASDLE<small>GUESS THE PUMP PRICE</small></div>
    </div>
    <div class="header-tools">
      <button class="icon-btn" id="howBtn" title="How to play"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 3.5 2.3c-.8.4-1 .9-1 1.7"/><path d="M12 17h.01"/></svg></button>
      <button class="icon-btn" id="statsBtn" title="Stats"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 20V10"/><path d="M10 20V4"/><path d="M16 20v-7"/><path d="M22 20H2"/></svg></button>
    </div>
  </header>

  <section class="pump">
    <span class="tag"><span class="dot"></span> Mystery Station · Puzzle <span id="puzzleNo">#000</span></span>
    <div class="display"><div class="lbl">Regular · Price / Gallon</div>
      <div class="readout" id="readout"><span class="cur">$</span><span id="readoutNum">?.??</span></div></div>
  </section>

  <section class="locator">
    <div class="mapwrap">
      <div class="panelhead"><span><b>◈</b> <span id="mapMode">LOCATOR · region</span></span><span class="zoomchip" id="zoomChip"></span></div>
      <div id="map"></div>
    </div>
    <div class="svwrap" id="svwrap">
      <div class="panelhead"><span><b style="color:var(--green)">●</b> GOOGLE STREET VIEW</span></div>
      <div id="streetview"></div>
    </div>
  </section>

  <div class="hints" id="hints"></div>
  <div class="guesses" id="guesses"></div>

  <section class="pad" id="pad">
    <div class="pendlbl">Your guess</div>
    <div class="pend" id="pend">$3.00</div>
    <input class="slider" id="slider" type="range" min="1.80" max="7.50" step="0.01" value="3.00">
    <div class="steppers"><button class="step" data-d="-0.10">−10¢</button><button class="step" data-d="-0.01">−1¢</button><button class="step" data-d="0.01">+1¢</button><button class="step" data-d="0.10">+10¢</button></div>
    <button class="submit" id="submit">Lock in guess</button>
    <div class="triesleft" id="triesleft"><b>5</b> guesses left</div>
  </section>

  <div id="resultMount"></div>

  <!-- ===================== GOOGLE ADSENSE — ONE UNIT ===================== -->
  <div class="adslot" id="adslot">
    <ins class="adsbygoogle" style="display:block;width:100%"
         data-ad-client="ca-pub-5391892658513330" data-ad-slot="3192746912"
         data-ad-format="auto" data-full-width-responsive="true"></ins>
    <span id="adPlaceholder">Single ad unit · add your AdSense IDs</span>
  </div>

  <footer>A real U.S. station, priced by Google. New station daily at midnight.</footer>
</div>

<div class="scrim" id="scrim"><div class="modal" id="modalBody"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ===========================================================================
   KEYS — fill these in, then deploy.
   • GOOGLE_MAPS_BROWSER_KEY: Maps JS API key, restricted by HTTP referrer
     (your domain) in Google Cloud. Meant to be public.
   • ADSENSE_CLIENT / ADSENSE_SLOT: from your AdSense account.
   Game stays fully playable while these are placeholders; map + ad show
   placeholders until set.
   =========================================================================== */
  const GOOGLE_MAPS_BROWSER_KEY = "AIzaSyAl4avbtr3ZBN87qiBneCbpPOj_qG-N7vA";
  const ADSENSE_CLIENT = "ca-pub-5391892658513330";
  const ADSENSE_SLOT   = "3192746912";

  const NATIONAL_AVG = 4.51;   // update occasionally from AAA/EIA
  const WIN_BAND=0.05, HOT_BAND=0.15, WARM_BAND=0.40, MAX_GUESSES=5;
  const $=id=>document.getElementById(id);

  const store=(()=>{let ok=false;try{localStorage.setItem("__t","1");localStorage.removeItem("__t");ok=true;}catch(e){}const mem={};
    return{get(k){try{return ok?localStorage.getItem(k):(k in mem?mem[k]:null);}catch(e){return k in mem?mem[k]:null;}},
           set(k,v){try{ok?localStorage.setItem(k,v):(mem[k]=v);}catch(e){mem[k]=v;}}};})();
  const SK="gasdle.v1";
  const loadState=()=>{try{return JSON.parse(store.get(SK))||{};}catch(e){return{};}};
  const saveState=s=>store.set(SK,JSON.stringify(s));

  let S=null, game=null, gmap=null, marker=null, mapsReady=false;

  (async function boot(){
    try{ const r=await fetch("daily.json",{cache:"no-store"}); S=await r.json(); }
    catch(e){ document.querySelector(".wrap").insertAdjacentHTML("beforeend",
      `<div class="result"><h2>No puzzle loaded</h2><div class="sub">Run <code>node pick-daily.js</code> to generate daily.json, then serve this folder over http.</div></div>`); return; }
    startGame(); initAds();
    if(GOOGLE_MAPS_BROWSER_KEY!=="YOUR_BROWSER_KEY"){
      const s=document.createElement("script");
      s.src=`https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_BROWSER_KEY}&callback=initMap`;
      s.async=true; document.head.appendChild(s);
    } else { $("map").outerHTML=`<div class="placeholder">Live Google map appears here once you set <code>GOOGLE_MAPS_BROWSER_KEY</code>.</div>`; }
  })();

  const DARK=[
    {elementType:"geometry",stylers:[{color:"#0e141b"}]},
    {elementType:"labels.text.fill",stylers:[{color:"#6b7686"}]},
    {elementType:"labels.text.stroke",stylers:[{color:"#0b0d10"}]},
    {featureType:"road",elementType:"geometry",stylers:[{color:"#222b36"}]},
    {featureType:"road",elementType:"labels",stylers:[{visibility:"off"}]},
    {featureType:"water",elementType:"geometry",stylers:[{color:"#0a1018"}]},
    {featureType:"poi",stylers:[{visibility:"off"}]},
    {featureType:"transit",stylers:[{visibility:"off"}]},
    {featureType:"administrative",elementType:"geometry",stylers:[{color:"#2a3645"}]}
  ];

  window.initMap=function(){
    mapsReady=true;
    gmap=new google.maps.Map($("map"),{center:{lat:S.lat,lng:S.lng},zoom:4,
      disableDefaultUI:true,gestureHandling:"none",keyboardShortcuts:false,styles:DARK,backgroundColor:"#0c1219"});
    setMapMode((game.done||game.guesses.length>=3)?"metro":"region");
    if(game.done||game.guesses.length>=4) revealStreet();
  };

  function setMapMode(mode){
    $("zoomChip").textContent = mode==="metro"?"ZOOM 13×":"ZOOM 4×";
    $("mapMode").textContent  = mode==="metro"?"LOCATOR · metro":"LOCATOR · region";
    if(!mapsReady) return;
    if(mode==="metro"){
      gmap.panTo({lat:S.lat,lng:S.lng}); gmap.setZoom(13);
      if(!marker) marker=new google.maps.Marker({position:{lat:S.lat,lng:S.lng},map:gmap,
        icon:{path:google.maps.SymbolPath.CIRCLE,scale:7,fillColor:"#ffb627",fillOpacity:1,strokeColor:"#1a1205",strokeWeight:2}});
    } else { gmap.setZoom(4); }
  }
  function revealStreet(){
    $("svwrap").classList.add("on");
    if(GOOGLE_MAPS_BROWSER_KEY==="YOUR_BROWSER_KEY"){
      $("streetview").outerHTML=`<div class="placeholder">Street View of the block appears here with your key.</div>`; return;
    }
    if(!mapsReady) return;
    new google.maps.StreetViewPanorama($("streetview"),{position:{lat:S.lat,lng:S.lng},
      pov:{heading:34,pitch:0},zoom:0,disableDefaultUI:true,addressControl:false,showRoadLabels:false,motionTracking:false});
  }

  function initAds(){
    if(ADSENSE_CLIENT.includes("XXXX")) return;
    $("adPlaceholder").style.display="none";
    document.querySelector(".adsbygoogle").setAttribute("data-ad-client",ADSENSE_CLIENT);
    document.querySelector(".adsbygoogle").setAttribute("data-ad-slot",ADSENSE_SLOT);
    const s=document.createElement("script"); s.async=true; s.crossOrigin="anonymous";
    s.src=`https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${ADSENSE_CLIENT}`;
    document.head.appendChild(s);
    s.onload=()=>{try{(adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}};
    /* MEMBERS: when a paid member is logged in, skip initAds() and hide #adslot. */
  }

  function startGame(){
    $("puzzleNo").textContent="#"+String(S.puzzle%1000).padStart(3,"0");
    game=restoreToday();
    setPending(3.00); renderGuesses(); renderHints(); updateTries();
    if(game.done){ $("pad").style.display="none"; $("readout").classList.toggle("win",game.won); animateReadout(S.price); showResult(game.won); }
    else if(game.guesses.length===0 && !loadState().seen){ const s=loadState(); s.seen=1; saveState(s); openHow(); }
  }
  function restoreToday(){ const s=loadState(); if(s.today&&s.today.puzzle===S.puzzle) return s.today; return {puzzle:S.puzzle,guesses:[],done:false,won:false}; }

  let pending=3.00;
  function setPending(v){pending=Math.min(7.50,Math.max(1.80,Math.round(v*100)/100));$("pend").textContent="$"+pending.toFixed(2);$("slider").value=pending;}
  $("slider").addEventListener("input",e=>setPending(parseFloat(e.target.value)));
  document.querySelectorAll(".step").forEach(b=>b.addEventListener("click",()=>setPending(pending+parseFloat(b.dataset.d))));

  function verdictFor(g){const diff=g-S.price,ad=Math.abs(diff);
    if(ad<=WIN_BAND)return{cls:"v-win",txt:"Spot on!",icon:check,win:true,temp:1};
    const t=ad<=HOT_BAND?"🔥 close":ad<=WARM_BAND?"warm":"cold";
    return{cls:diff>0?"v-high":"v-cold",txt:(diff>0?"Too high":"Too low")+" · "+t,icon:diff>0?arrowDown:arrowUp,win:false,temp:ad<=HOT_BAND?.9:ad<=WARM_BAND?.55:.25};}
  function renderGuesses(){const el=$("guesses");el.innerHTML="";game.guesses.forEach(g=>{const v=verdictFor(g);const row=document.createElement("div");row.className="grow";
    row.innerHTML=`<div class="gval">$${g.toFixed(2)}</div><div class="meter"><i style="width:${Math.round(v.temp*100)}%;background:${v.win?'var(--green)':'var(--amber)'}"></i></div><div class="verdict ${v.cls}">${v.icon}<span>${v.txt}</span></div>`;el.appendChild(row);});}
  function taxDesc(c){return c==null?"":c>=50?"among the highest in the U.S.":c>=36?"above the U.S. average":c>=26?"around the U.S. average":"among the lowest in the U.S.";}
  function addHint(k,vHtml,badge){const el=document.createElement("div");el.className="hint";
    el.innerHTML=`<div><div class="hk">${k}</div><div class="hv">${vHtml}</div></div>`+(badge?`<div class="hbadge">${badge}</div>`:"");$("hints").appendChild(el);}
  function renderHints(){
    $("hints").innerHTML="";
    const n=game.done?4:Math.min(game.guesses.length,4);
    if(n>=1 && S.tax!=null) addHint("State gas tax",`<b>${S.tax}¢</b>/gal — ${taxDesc(S.tax)}`,"vs avg "+NATIONAL_AVG.toFixed(2));
    if(n>=2){const init=(S.brand||"?").replace(/[^A-Za-z0-9]/g,"").slice(0,2).toUpperCase();
      addHint("Brand",`<div class="brandwrap"><div class="blogo">${init}</div><span>${S.brand}</span></div>`);}
    if(n>=3) addHint("Location",`${S.city?S.city+", ":""}${S.state}`,"map zoomed");
    setMapMode(n>=3?"metro":"region");
    if(n>=4) revealStreet();
  }
  function updateTries(){const left=MAX_GUESSES-game.guesses.length;$("triesleft").innerHTML=`<b>${left}</b> guess${left===1?"":"es"} left`;}

  $("submit").addEventListener("click",()=>{if(game.guesses.includes(pending)){const p=$("pend");p.classList.remove("shake");void p.offsetWidth;p.classList.add("shake");toast("Already guessed that");return;}doGuess();});
  function doGuess(){if(game.done)return;game.guesses.push(pending);const r=$("readout");r.classList.remove("flick");void r.offsetWidth;r.classList.add("flick");
    const v=verdictFor(pending);if(v.win)finish(true);else if(game.guesses.length>=MAX_GUESSES)finish(false);else{renderGuesses();renderHints();updateTries();persist();}}
  function finish(won){game.done=true;game.won=won;renderGuesses();renderHints();$("pad").style.display="none";
    $("readout").classList.toggle("win",won);animateReadout(S.price);recordStats(won,game.guesses.length);persist();showResult(won);}
  function animateReadout(t){let s=performance.now();(function tick(n){const p=Math.min(1,(n-s)/900),e=1-Math.pow(1-p,3);$("readoutNum").textContent=(t*e).toFixed(2);if(p<1)requestAnimationFrame(tick);else $("readoutNum").textContent=t.toFixed(2);})(s);}

  function staleNote(){ if(!S.priceUpdated) return ""; const d=Math.floor((Date.now()-new Date(S.priceUpdated))/86400000);
    return `Google price, ${d<=0?"updated today":d===1?"~1 day old":"~"+d+" days old"}`; }
  function showResult(won){const n=game.guesses.length;
    $("resultMount").innerHTML=`<div class="result"><h2>${won?"Filled up! ⛽":"Out of gas 😶"}</h2>
      <div class="sub">${won?`You nailed it in ${n} guess${n===1?"":"es"}.`:`The pump read $${S.price.toFixed(2)}.`}</div>
      <div class="full"><div class="nm">${S.brand}</div><div class="ad">${S.address||((S.city?S.city+", ":"")+S.state)}</div>
        <div class="pr">$${S.price.toFixed(2)} / gal</div><div class="stale">${staleNote()}</div></div>
      <div class="resbtns"><button class="btn-share" id="shareBtn">Share result</button><button class="btn-ghost" id="statsBtn2">View stats</button></div>
      <div class="countdown">Next station in <b id="cd">--:--:--</b></div></div>`;
    $("shareBtn").addEventListener("click",share);$("statsBtn2").addEventListener("click",openStats);startCountdown();}
  function shareGrid(){return game.guesses.map(g=>{const ad=Math.abs(g-S.price);return ad<=WIN_BAND?"🟩":ad<=HOT_BAND?"🟧":ad<=WARM_BAND?"🟨":"⬛";}).join("");}
  function share(){const sc=game.won?game.guesses.length+"/"+MAX_GUESSES:"X/"+MAX_GUESSES;const txt=`GASDLE #${S.puzzle%1000} ${sc}\n${shareGrid()}\nguess the pump price`;
    if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>toast("Copied to clipboard"));else toast("Copy not supported");}
  function startCountdown(){(function tick(){const now=new Date(),end=new Date(now);end.setHours(24,0,0,0);let s=Math.floor((end-now)/1000);
    const h=String(Math.floor(s/3600)).padStart(2,"0");s%=3600;const m=String(Math.floor(s/60)).padStart(2,"0"),ss=String(s%60).padStart(2,"0");
    const el=$("cd");if(el)el.textContent=`${h}:${m}:${ss}`;setTimeout(tick,1000);})();}
  function persist(){const s=loadState();s.today=game;saveState(s);}
  function recordStats(won,tries){const s=loadState();s.played=(s.played||0)+1;s.dist=s.dist||[0,0,0,0,0];
    if(won){s.wins=(s.wins||0)+1;s.dist[tries-1]++;s.streak=((s.lastDay===S.puzzle-1)?(s.streak||0):0)+1;s.max=Math.max(s.max||0,s.streak);}else s.streak=0;
    s.lastDay=S.puzzle;s.today=game;saveState(s);}

  function openStats(){const s=loadState();const played=s.played||0,wins=s.wins||0,dist=s.dist||[0,0,0,0,0];
    const winpct=played?Math.round(wins/played*100):0,maxd=Math.max(1,...dist);
    const bars=dist.map((c,i)=>{const cur=game.done&&game.won&&game.guesses.length===i+1;return`<div class="dbar"><span class="n">${i+1}</span><div class="fill ${cur?'cur':''}" style="width:${Math.max(8,Math.round(c/maxd*100))}%">${c}</div></div>`;}).join("");
    openModal(`<button class="close-x" data-close>×</button><h3>Your stats</h3><div class="stats"><div class="stat"><b>${played}</b><span>Played</span></div><div class="stat"><b>${winpct}</b><span>Win %</span></div><div class="stat"><b>${s.streak||0}</b><span>Streak</span></div><div class="stat"><b>${s.max||0}</b><span>Max</span></div></div><div class="hk" style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700">Guess distribution</div>${bars}`);}
  function openHow(){openModal(`<button class="close-x" data-close>×</button><h3>How to play</h3><p>A real U.S. gas station is hidden each day. Guess the price of <b>regular</b>, per gallon.</p><ul class="how"><li><b>5 guesses</b>, with too high / too low + hot-cold feedback.</li><li>Start with a <b>region map</b>; each wrong guess unlocks: <b>state gas tax → brand → the map zooms in → Street View</b>.</li><li>Within <b>5¢</b> wins. New station at midnight.</li></ul>`);}
  const scrim=$("scrim"),modalBody=$("modalBody");
  function openModal(h){modalBody.innerHTML=h;scrim.classList.add("on");modalBody.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>scrim.classList.remove("on"));}
  scrim.addEventListener("click",e=>{if(e.target===scrim)scrim.classList.remove("on");});
  $("statsBtn").addEventListener("click",openStats);$("howBtn").addEventListener("click",openHow);
  function toast(m){const t=$("toast");t.textContent=m;t.classList.add("on");setTimeout(()=>t.classList.remove("on"),1700);}
  const arrowUp='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>';
  const arrowDown='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>';
  const check='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
</script>
</body>
