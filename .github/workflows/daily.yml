name: Update daily and deploy

on:
  schedule:
    - cron: "0 0 * * *" # change this while testing
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  pick-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate daily puzzle
        run: node pick-daily.js
        env:
          GOOGLE_SERVER_KEY: ${{ secrets.GOOGLE_SERVER_KEY }}

      - name: Commit updated daily.json
        run: |
          git config user.name "gasdle-bot"
          git config user.email "bot@gasdle"
          git add daily.json
          git diff --cached --quiet || git commit -m "Update daily puzzle"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site files
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
