name: Update daily

on:
  schedule:
    - cron: "30 20 * * *" # 1:25 PM California time during PDT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pick:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run daily picker
        run: node pick-daily.js
        env:
          GOOGLE_SERVER_KEY: ${{ secrets.GOOGLE_SERVER_KEY }}

      - name: Commit daily.json
        run: |
          git config user.name "gasdle-bot"
          git config user.email "bot@gasdle"
          git add daily.json
          git diff --cached --quiet || git commit -m "daily"
          git push
