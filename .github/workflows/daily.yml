name: Pick Daily

on:
  schedule:
    - cron: "25 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pick:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate daily pick
        run: node pick-daily.js
        env:
          GOOGLE_SERVER_KEY: ${{ secrets.GOOGLE_SERVER_KEY }}

      - name: Commit daily.json
        run: |
          git config user.name "gasdle-bot"
          git config user.email "bot@gasdle"
          git add daily.json
          git diff --cached --quiet || git commit -m "daily"
          git push
